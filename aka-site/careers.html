<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Careers — AKA</title>
  <meta name="description" content="Join AKA (Al-Akkad). Apply online and upload your CV to work with a leading medical-equipment agency in Syria." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="images/aka-logo.svg?v=4" type="image/svg+xml" />
</head>
<body data-page="careers.html">
  <div id="site-header"></div>

  <main>
    <!-- HERO -->
    <section class="hero">
      <div class="container split">
        <img src="https://images.unsplash.com/photo-1521791136064-7986c2920216?auto=format&fit=crop&w=1100&q=80" alt="Team handshake" />
        <div>
          <h1 data-i18n="careers.hero.h1">Careers at AKA</h1>
          <p class="lead" data-i18n="careers.hero.lead">Join our team. We're always looking for talented people in medical equipment, biomedical engineering, sales, and service across Syria.</p>
        </div>
      </div>
    </section>

    <!-- APPLICATION FORM -->
    <section class="section">
      <div class="container">
        <h2 class="center" data-i18n="careers.apply.title">Apply now</h2>
        <p class="center measure-center form-intro" data-i18n="careers.apply.lead">Fill in the form below and attach your CV. Our team will review your application and get back to you.</p>

        <!-- Submits to the AKA backend Worker (js/forms.js): the application is
             saved to D1 and the CV is stored in R2. View them at the Worker's
             /admin page. -->
        <form class="form" data-api="apply" method="post" enctype="multipart/form-data">
          <label for="name" data-i18n="form.name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="email" data-i18n="form.email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="phone" data-i18n="careers.form.phone">Phone</label>
          <input type="tel" id="phone" name="phone" required />

          <label for="position" data-i18n="careers.form.position">Position you're applying for</label>
          <input type="text" id="position" name="position" required />

          <label for="message" data-i18n="careers.form.message">Cover letter / message</label>
          <textarea id="message" name="message"></textarea>

          <label for="cv" data-i18n="careers.form.cv">Upload your CV (PDF or Word)</label>
          <input type="file" id="cv" name="attachment" accept=".pdf,.doc,.docx" required />

          <button type="submit" class="btn" data-i18n="careers.form.submit">Submit application</button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>
  <script src="js/i18n.js?v=4"></script>
  <script src="js/components.js?v=4"></script>
  <script src="js/forms.js?v=1"></script>
</body>
</html>
